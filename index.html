<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Interior Designer | Best Luxury Home Decor & Modular Kitchen Mumbai</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #111111;
            --accent-gold: #bfa15f; /* Royal Classic Gold */
            --gold-glow: rgba(191, 161, 95, 0.2);
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --text-light: #ffffff;
            --bg-luxury: #fbfaf6;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            --hover-shadow: 0 20px 40px rgba(191, 161, 95, 0.15);
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-luxury);
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .brand-name {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.5px;
        }

        /* Top Premium Navigation Bar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(17, 17, 17, 0.96);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(191, 161, 95, 0.2);
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-light);
        }

        /* Custom Structured Logo Styling */
        .logo-wrapper {
            background: #ffffff;
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(191, 161, 95, 0.3);
        }

        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .brand-name span {
            color: var(--accent-gold);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
            align-items: center;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: var(--transition);
            padding: 5px 0;
            position: relative;
        }

        nav a:hover, nav a.active {
            color: var(--accent-gold);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: var(--transition);
        }

        nav a:hover::after {
            width: 100%;
        }

        .menu-btn {
            display: none;
            color: var(--text-light);
            font-size: 26px;
            cursor: pointer;
        }

        /* Hero Fullscreen Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-light);
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: 58px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.2;
            animation: fadeInDown 1s ease;
        }

        .hero-content h1 span {
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .hero-content p {
            font-size: 21px;
            max-width: 750px;
            margin: 0 auto 40px;
            font-weight: 300;
            color: #f4edd9;
            letter-spacing: 1px;
        }

        .btn-gold {
            display: inline-block;
            padding: 15px 45px;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            transition: var(--transition);
            background: transparent;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-gold::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--accent-gold);
            transition: var(--transition);
            z-index: -1;
        }

        .btn-gold:hover {
            color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(191, 161, 95, 0.4);
            transform: translateY(-3px);
        }

        .btn-gold:hover::before {
            width: 100%;
        }

        /* Global Sections Styling */
        section {
            padding: 120px 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 42px;
            margin-bottom: 30px;
            font-weight: 700;
            position: relative;
            padding-bottom: 22px;
            text-transform: capitalize;
        }

        .section-title span {
            color: var(--accent-gold);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px; height: 3px;
            background: var(--accent-gold);
        }

        /* Portfolio Advanced Filter System */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #e5e5e0;
            padding: 10px 25px;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 30px;
            transition: var(--transition);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Services Grid Layout */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .service-card {
            background: white;
            padding: 50px 35px;
            text-align: center;
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.02);
            transition: var(--transition);
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--hover-shadow);
            border-color: var(--accent-gold);
        }

        .service-icon {
            font-size: 50px;
            color: var(--accent-gold);
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .service-card:hover .service-icon {
            transform: scale(1.1);
        }

        .service-card h3 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Premium Statistics Counters Section */
        .stats-section {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 80px 20px;
            border-top: 2px solid var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .stat-item h2 {
            font-size: 48px;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stat-item p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #cccccc;
        }

        /* Luxury Work Showcase Portfolio Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            height: 300px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .gallery-item.hide {
            transform: scale(0.8);
            opacity: 0;
            position: absolute;
            width: 0;
            height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17,17,17,0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
            color: var(--text-light);
            text-align: center;
            padding: 25px;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay h4 {
            font-size: 22px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .gallery-overlay p {
            font-size: 13px;
            letter-spacing: 1px;
            color: #dddddd;
        }

        /* Premium Lightbox Modal Component */
        .lightbox-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .lightbox-modal.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 85vh;
        }

        .lightbox-content img {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            border: 2px solid var(--accent-gold);
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: -45px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lightbox-close:hover {
            color: var(--accent-gold);
        }

        /* Premium Testimonials Reviews Section */
        .testimonials {
            background: #f5f3eb;
            max-width: 100%;
            padding: 120px 20px;
        }

        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .review-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .review-card i {
            color: var(--accent-gold);
            font-size: 24px;
            margin-bottom: 20px;
            display: block;
        }

        .review-card p {
            font-style: italic;
            color: #444444;
            margin-bottom: 20px;
        }

        .review-card h5 {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Premium Form & Contact Info Box */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 70px;
            background: white;
            padding: 60px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.01);
        }

        .info-box h3 {
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .info-box p {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .info-item i {
            color: var(--accent-gold);
            font-size: 24px;
            width: 30px;
            text-align: center;
        }

        .info-item a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .info-item a:hover {
            color: var(--accent-gold);
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .contact-form input, .contact-form select, .contact-form textarea {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #e5e5e0;
            background: #fafafa;
            font-family: inherit;
            font-size: 14px;
            border-radius: 6px;
            transition: var(--transition);
            color: var(--text-dark);
        }

        .contact-form input:focus, .contact-form select:focus, .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: #ffffff;
            box-shadow: 0 0 15px rgba(191, 161, 95, 0.15);
        }

        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: 2px solid var(--primary-color);
            padding: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .btn-submit:hover {
            background: transparent;
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Footer Layout Elements */
        footer {
            background: var(--primary-color);
            color: rgba(255,255,255,0.55);
            text-align: center;
            padding: 50px 20px;
            border-top: 4px solid var(--accent-gold);
            font-size: 14px;
        }

        /* Dynamic Fixed Action Bar Layout Layer */
        .floating-actions {
            position: fixed;
            bottom: 35px;
            right: 35px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .float-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 28px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            transition: var(--transition);
        }

        .float-btn:hover {
            transform: scale(1.15) translateY(-5px);
        }

        .float-wa { background-color: #25D366; }
        .float-phone { background-color: #007bff; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 992px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
                padding: 40px;
                gap: 50px;
            }
        }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0;
                width: 100%;
                background: var(--primary-color);
                padding: 30px;
                border-bottom: 2px solid var(--accent-gold);
                text-align: center;
                gap: 25px;
            }
            nav ul.show { display: flex; }
            .hero-content h1 { font-size: 38px; }
            .section-title { font-size: 32px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
